<!DOCTYPE html>

<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>नामकरण सोहळा 👶</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap" rel="stylesheet"/>

<style>

body {
  margin:0;
  font-family:'Lato',sans-serif;
  background: url('IMG-20260505-WA0061.jpg') no-repeat center/cover;
  height:100vh;
  overflow-x:hidden;
}

/* INTRO */
#intro {
  position:fixed;
  inset:0;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

#intro button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  background:#f7c948;
  border-radius:30px;
}

/* MUSIC */
#music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#e8416a;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  z-index:999;
}

/* GLASS CARD */
.glass {
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 30px;
  margin: 20px;
  color: #fff;
  text-align:center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* ANIMATION */
.fade-up {
  opacity:0;
  transform: translateY(40px);
  animation: fadeUp 1.5s ease forwards;
}
@keyframes fadeUp {
  to { opacity:1; transform: translateY(0); }
}

/* BABY */
.baby {
  width:180px;
  height:180px;
  border-radius:50%;
  overflow:hidden;
  margin:20px auto;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.baby img { width:100%; height:100%; object-fit:cover; }

/* NAME */
#baby-name {
  font-family:'Playfair Display';
  font-size:32px;
  color:#ffd166;
}

/* HEART */
.heart {
  position:fixed;
  font-size:20px;
  animation: float 2s linear forwards;
}
@keyframes float {
  100% { transform:translateY(-150px); opacity:0; }
}

/* FLOWERS */
@keyframes fall {
  100% { transform:translateY(100vh); opacity:0; }
}

/* BUTTON */
.btn {
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#e8416a;
  color:white;
  cursor:pointer;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  color:white;
  justify-content:center;
  align-items:center;
  text-align:center;
  z-index:2000;
}

.popup-box {
  background:#3b1a2e;
  padding:40px;
  border-radius:20px;
}

</style>

</head>

<body>

<!-- INTRO -->

<div id="intro">
  <h2>👶 Welcome</h2>
  <p>नामकरण सोहळा आमंत्रण</p>
  <button onclick="enter()">Enter</button>
</div>

<!-- AUDIO -->

<audio id="audio" loop>
  <source src="https://raw.githubusercontent.com/solapureannappa-web/MinakshiBirthday/main/jaisemerat_NkIxrAeA.mp3">
</audio>

<div id="music-btn">🎵</div>

<!-- MAIN -->

<div class="glass fade-up">

  <h2>|| श्री गणेशाय नमः ||</h2>

  <h1>नामकरण सोहळा 💖</h1>

  <div class="baby">
    <img src="baby.jpg">
  </div>

  <h1 id="baby-name"></h1>

  <p>👨 नागेश & 👩 रेखा</p>

  <p>📅 19 मे 2025</p>
  <p>⏰ 2:30 PM</p>

  <p>📍 वेताळ नगर बार्शी रोड,<br>तुळजापूर, धाराशिव</p>

<button class="btn" onclick="openMap()">📍 Map</button> <button class="btn" onclick="share()">📲 Share</button>

</div>

<!-- POPUP -->

<div id="popup">
  <div class="popup-box">
    💖 आपले स्वागत आहे 💖<br><br>
    कृपया उपस्थित राहा 🙏
    <br><br>
    <button onclick="closePop()">Close</button>
  </div>
</div>

<script>

const audio=document.getElementById('audio');
let playing=false;

/* ENTER */
function enter(){
  document.getElementById('intro').style.display='none';
  audio.play();
  playing=true;
  firework();
}

/* MUSIC */
document.getElementById('music-btn').onclick=()=>{
  if(playing){audio.pause();playing=false;}
  else{audio.play();playing=true;}
};

/* NAME TYPE */
const name="Baby Name";
let i=0;
function typeName(){
  if(i<name.length){
    document.getElementById('baby-name').innerHTML+=name.charAt(i);
    i++;
    setTimeout(typeName,120);
  }
}
setTimeout(typeName,2000);

/* HEART */
document.addEventListener('click',e=>{
  const h=document.createElement('div');
  h.className='heart';
  h.innerHTML='💖';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2000);
});

/* FLOWERS */
const items=['🌸','✨','💫','🌼'];
for(let i=0;i<15;i++){
  let el=document.createElement('div');
  el.innerHTML=items[Math.floor(Math.random()*items.length)];
  el.style.position='fixed';
  el.style.left=Math.random()*100+'vw';
  el.style.top='-20px';
  el.style.fontSize='20px';
  el.style.animation=`fall ${5+Math.random()*5}s linear infinite`;
  document.body.appendChild(el);
}

/* FIREWORK */
function firework(){
  for(let i=0;i<25;i++){
    let d=document.createElement('div');
    d.style.position='fixed';
    d.style.width='6px';
    d.style.height='6px';
    d.style.background='gold';
    d.style.left='50%';
    d.style.top='50%';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1000);
  }
}

/* MAP */
function openMap(){
  window.open("https://maps.google.com/?q=Tuljapur, Dharashiv");
}

/* SHARE */
function share(){
  let msg=`👶 नामकरण सोहळा

📅 19 मे 2025
⏰ 2:30 PM
📍 तुळजापूर

आपले सहर्ष स्वागत आहे 💖`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

/* POPUP */
setTimeout(()=>{
  document.getElementById('popup').style.display='flex';
},15000);

function closePop(){
  document.getElementById('popup').style.display='none';
}

</script>

</body>
</html>
