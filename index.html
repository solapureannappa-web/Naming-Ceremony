<!DOCTYPE html>

<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>नामकरण सोहळा 👶</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Lato&display=swap" rel="stylesheet"/>

<style>
body {
  margin:0;
  font-family:'Lato',sans-serif;
  background:#fff8f0;
  color:#3b1a2e;
  overflow-x:hidden;
}

/* MUSIC */
#music-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#e8416a;
  color:white;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  z-index:999;
}

/* OVERLAY */
#overlay {
  position:fixed;
  inset:0;
  background:#3b1a2e;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.start-btn {
  margin-top:20px;
  padding:15px 40px;
  background:#f7c948;
  border:none;
  border-radius:40px;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#fde8f0,#fff);
}

.hero h1 {
  font-family:'Playfair Display';
  color:#e8416a;
}

/* BABY */
.baby {
  width:200px;
  height:200px;
  border-radius:50%;
  overflow:hidden;
  margin:20px 0;
}

.baby img { width:100%; height:100%; object-fit:cover; }

/* SECTION */
.section { padding:60px 20px; text-align:center; }

.card {
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.1);
}

/* GALLERY */
.gallery {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.gallery img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}
.lightbox img {
  max-width:90%;
  border-radius:10px;
}

/* HEART */
.heart {
  position:fixed;
  animation:float 2s linear forwards;
}
@keyframes float {
  100% { transform:translateY(-150px); opacity:0; }
}

/* FLOWERS */
.flower {
  position:fixed;
  animation:fall linear infinite;
}
@keyframes fall {
  100% { transform:translateY(100vh); opacity:0; }
}

/* BUTTONS */
.btn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#e8416a;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<audio id="audio" loop>
<source src="https://raw.githubusercontent.com/solapureannappa-web/MinakshiBirthday/main/jaisemerat_NkIxrAeA.mp3">
</audio>

<div id="music-btn">🎵</div>

<div id="overlay">
  <h2>👶 नामकरण सोहळा</h2>
  <button class="start-btn" onclick="start()">Open Invitation</button>
</div>

<div class="hero">
  <h1>|| श्री गणेशाय नमः ||</h1>
  <h1>नामकरण सोहळा 💖</h1>

  <div class="baby">
    <img src="baby.jpg">
  </div>
</div>

<div class="section">
  <div class="card">
    <h2>📅 तपशील</h2>
    <p>👨 नागेश & 👩 रेखा</p>
    <p>📅 19 मे 2025</p>
    <p>⏰ 2:30 PM</p>
    <p>📍 तुळजापूर, धाराशिव</p>

```
<button class="btn" onclick="openMap()">📍 Open Map</button>
<button class="btn" onclick="share()">📲 Share</button>
```

  </div>
</div>

<div class="section">
  <h2>📸 Moments</h2>
  <div class="gallery">
    <img src="img1.jpg" onclick="openImg(this.src)">
    <img src="img2.jpg" onclick="openImg(this.src)">
    <img src="img3.jpg" onclick="openImg(this.src)">
    <img src="img4.jpg" onclick="openImg(this.src)">
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="this.style.display='none'">
  <img id="lb">
</div>

<script>

const audio=document.getElementById('audio');
let playing=false;

function start(){
  document.getElementById('overlay').style.display='none';
  audio.play();
  firework();
}

/* MUSIC */
document.getElementById('music-btn').onclick=()=>{
  if(playing){audio.pause();playing=false;}
  else{audio.play();playing=true;}
};

/* HEART */
document.addEventListener('click',e=>{
  const h=document.createElement('div');
  h.className='heart';
  h.innerHTML='💖';
  h.style.left=e.clientX+'px';
  h.style.top=e.clientY+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2000);
});

/* FLOWERS */
for(let i=0;i<8;i++){
  let f=document.createElement('div');
  f.className='flower';
  f.innerHTML='🌸';
  f.style.left=Math.random()*100+'vw';
  f.style.animationDuration=5+Math.random()*5+'s';
  document.body.appendChild(f);
}

/* LIGHTBOX */
function openImg(src){
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('lb').src=src;
}

/* FIREWORK */
function firework(){
  for(let i=0;i<20;i++){
    let d=document.createElement('div');
    d.style.position='fixed';
    d.style.width='6px';
    d.style.height='6px';
    d.style.background='red';
    d.style.left='50%';
    d.style.top='50%';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),1000);
  }
}

/* MAP */
function openMap(){
  window.open("https://maps.google.com");
}

/* SHARE */
function share(){
  let msg="नामकरण सोहळा आमंत्रण 👶";
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}

</script>

</body>
</html>
